  - {name: ♻️ 港台智能, type: smart, uselightgbm: false, collectdata: false, include-all: true, interval: 300, filter: "(?=.*(港|HK|(?i)HongKing|台湾|TW))^((?!(日|韩|新|深|官网|邮箱|美|0.5)).)*$"}
  - {name: ♻️ 日韩智能, type: smart, uselightgbm: false, collectdata: false, include-all: true, interval: 300, filter: "(?=.*(日本|JP|(?i)Japan|韩国))^((?!(港|台|新|美|0.5)).)*$" }
  - {name: ♻️ 狮城智能, type: smart, uselightgbm: false, collectdata: false, include-all: true, interval: 300, filter: "(?=.*(新加坡|坡|狮城|SG|Singapore))^((?!(港|台|韩|日|美|0.5)).)*$" }
  - {name: ♻️ 美加智能, type: smart, uselightgbm: false, collectdata: false, include-all: true, interval: 300, filter: "(?=.*(美|US|(?i)States|America|加拿大))^((?!(港|台|日|韩|新|0.5)).)*$"}
  - {name: 🆓 平价智能, type: smart, uselightgbm: false, collectdata: false, include-all: true, interval: 300, filter: "(?=.*(0.5|0.1))^((?!(如果|是客|使用|更新|剩余)).)*$" } 
  - {name: 🎥 奈飞节点, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "(?i)NETFLIX|奈飞|NetFlix|流媒体解锁|IEPL"}
