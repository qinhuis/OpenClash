  - {name: 🤙 IPV6智能, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "(?i)ipv6"}  
  - {name: 💖 红杏, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(红杏))^((?!(直连|建议|官网|节点|刷新|邮箱|0.1X|0.1x|0.5X|0.5x|剩余|套餐|流媒体解锁)).)*$"}
  - {name: 🐮 牛牛, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(牛牛))^((?!(直连|建议|官网|节点|刷新|邮箱|0.1X|0.1x|0.5X|0.5x|剩余|套餐|流媒体解锁)).)*$"}
  - {name: 👽 魔戒, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(魔戒))^((?!(直连|建议|官网|节点|刷新|邮箱|0.1X|0.1x|0.5X|0.5x|剩余|套餐|流媒体解锁)).)*$"}
  - {name: ♻️ 自动选择, type: smart, uselightgbm: false, collectdata: false, include-all: true, interval: 300, filter: "^((?!(直连|剩余|套餐|官网|邮箱|异常|更新)).)*$"}
  - {name: 🌐 全部节点, type: select, include-all: true, filter: "^((?!(剩余|套餐|官网|邮箱|异常|更新)).)*$"}


