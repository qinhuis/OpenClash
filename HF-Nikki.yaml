# 全局配置 
mixed-port: 7890
allow-lan: true
bind-address: "*"
ipv6: false
unified-delay: true
tcp-concurrent: true
log-level: warning
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 15
profile:
  store-selected: true
  store-fake-ip: true

# 为防止使用插件朋友遇到面板问题，我注释掉了此模块。
#external-controller: 0.0.0.0:9090
#secret: ""
#external-ui: ui
#external-ui-name: zashboard
#external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"

# 嗅探（fakeip下其实可以不用嗅探）
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

# 入站
tun:
  enable: true
  # system/gvisor/mixed
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  #使用nikki，混入全部不修改的情况，开启接口指定为nikki
  #device: nikki
  #使用仅内核自行修改下面三项为true
  auto-route: false
  auto-redirect: false
  auto-detect-interface: false

# DNS模块
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/15
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "rule-set:fakeipfilter_domain"
    - "rule-set:Locallite"
    - "rule-set:private_domain"
    - "rule-set:cn_domain"
    - "rule-set:steam_domain"
    - "rule-set:steam_cn_domain"
  default-nameserver:
    - https://223.5.5.5/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver-policy: 
    "rule-set:Locallite":
     - 10.0.0.2
     - 10.0.0.1
    "rule-set:private_domain,cn_domain":
    - https://223.5.5.5/dns-query
    "rule-set:geolocation-!cn":
      - "https://dns.cloudflare.com/dns-query"
      - "https://dns.google/dns-query"
 
 
# 锚点
pr: &pr {type: select, proxies: [♻️ 自动选择, 💖 红杏, 🐮 牛牛, 👽 魔戒, ♻️ 港台智能, ♻️ 日韩智能, ♻️ 狮城智能, ♻️ 美加智能, 🤙 IPV6智能, 🇭🇰 香港节点, 🇯🇵 日本节点, 🇸🇬 狮城节点, 🇺🇲 美国节点, 🌐 全部节点, 🆓 平价智能, 直连]}
gpt: &gpt {type: select, proxies: [G GPT, ♻️ 自动选择, ♻️ 美加智能, 🇺🇲 美国节点, 🌐 全部节点]}
tk: &tk {type: select, proxies: [♻️ 自动选择, ♻️ 日韩智能, ♻️ 美加智能, 🇯🇵 日本节点, 🇺🇲 美国节点, 🌐 全部节点]}
nf: &nf {type: select, proxies: [🎥 奈飞节点, ♻️ 自动选择, ♻️ 日韩智能, ♻️ 美加智能, 🇯🇵 日本节点, 🇺🇲 美国节点, 🌐 全部节点]} 
# 出站策略 smart参数 （ uselightgbm: false, collectdata: false, strategy: sticky-sessions,policy-priority: "Premium:0.9;SG:1.3" ）
# 没有再使用锚点，是考虑很多新手修改难度，这样新手修改某个分组更容易些。
proxy-groups:
  - {name: 🚀 默认代理, !!merge <<: *pr}
